<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Controle da Malha Viária</title><style>body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:#f3f6fa;color:#173052;display:grid;place-items:center;min-height:100vh}.box{background:#fff;border:1px solid #dfe7f1;border-radius:16px;padding:24px 28px;box-shadow:0 10px 30px rgba(20,55,90,.08);text-align:center}.spin{width:30px;height:30px;border:4px solid #dfe7f1;border-top-color:#1769d2;border-radius:50%;margin:0 auto 14px;animation:r 1s linear infinite}@keyframes r{to{transform:rotate(360deg)}}small{display:block;color:#718198;margin-top:6px}</style></head><body><div class="box"><div class="spin"></div><strong>Carregando o dashboard...</strong><small>Controle da Malha Viária</small></div><script>(async()=>{try{const b64=(await fetch('./data/01.txt?v=2',{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error('Dados não encontrados');return r.text()})).trim();const bin=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));const ds=new DecompressionStream('gzip');const html=await new Response(new Blob([bin]).stream().pipeThrough(ds)).text();document.open();document.write(html);document.close()}catch(e){document.querySelector('.box').innerHTML='<strong>Não foi possível carregar o dashboard.</strong><small>'+e.message+'</small>'}})();</script></body></html>
